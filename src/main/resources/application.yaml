spring:
  application:
    name: app

  datasource:
    url: jdbc:postgresql://localhost:5432/tech_challenge_data
    username: postgres
    password: challenge
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true