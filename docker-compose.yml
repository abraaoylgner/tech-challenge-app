  version: '3.8'

  services:
    db:
      image: postgres:16
      container_name: meu-postgres
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: challenge
        POSTGRES_DB: tech_challenge_data
      ports:
        - "5432:5432"
      volumes:
        - postgres-data:/var/lib/postgresql/data

  volumes:
    postgres-data: